name: usb_cam_app
description: Android USB Camera App - supports all UVC, EasyCap, and Non-UVC devices
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.4.9
  riverpod_annotation: ^2.3.3
  get_it: ^7.6.7
  permission_handler: ^11.3.0
  path_provider: ^2.1.1
  video_player: ^2.8.1
  intl: ^0.19.0
  shared_preferences: ^2.2.2
  logger: ^2.0.2+1
  flutter_hooks: ^0.20.3
  hooks_riverpod: ^2.4.9

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  riverpod_generator: ^2.3.9
  build_runner: ^2.4.7

flutter:
  uses-material-design: true
